<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Thingy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span id="achievement">
            <span id="achievement-illustration"></span>
            <span id="achievement-content"><p class="achievement-text">Un immense test </p></span>
        </span>
        <div class="pannel">
            <div class="stats">
                <p class="stats-label">Score : <span class="numbers-label" id="score-label"></span></p>
                <p class="stats-label">Coins : <span class="numbers-label" id="coin-label"></span></p>
                <p class="stats-label">Lvl : <span class="numbers-label" id="lvl-label"></span></p>
                <p class="stats-label">XP : 
                    <span class="loading-bar"><span id="xp-fill" class="filling-loading-bar"></span></span>
                    <span class="numbers-label" id="xp-label"></span>
                </p>
            </div>
            <div class="upgrades">

            </div>
        </div>
        <div class="gameview">
            
            <span id="clickable"></span>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
